name: Deploy to Hosting (FTP)

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v3

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Path tới thư mục chứa source code trên hosting (Ví dụ: iNet Hostings) 
          # Lưu ý: Do FTP User đã trỏ sẵn vào /domains/onetask.1pixel.vn/ 
          # Nên thư mục web root chỉ là public_html/ (đường dẫn tương đối)
          server-dir: public_html/
          protocol: ftps
          port: 21
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/
            .gitignore
